<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Primary Meta Tags -->
  <meta name="title" content="PRISM">
  <meta name="description" content="PRISM — coming soon.">
  <meta name="robots" content="index, follow">
  <meta name="language" content="English">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="PRISM">
  <meta property="og:title" content="PRISM">
  <meta property="og:description" content="PRISM — coming soon.">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="PRISM">
  <meta name="twitter:description" content="PRISM — coming soon.">

  <!-- Theme -->
  <meta name="theme-color" content="#2563eb">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <title>PRISM</title>

  <link rel="stylesheet" href="static/css/bulma.min.css">
  <link rel="stylesheet" href="static/css/index.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    .prism-hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
    }

    .prism-title {
      font-size: 5rem;
      letter-spacing: 0.06em;
      margin-bottom: 1.5rem !important;
    }

    .prism-tagline {
      font-size: 1.25rem;
      color: var(--text-secondary);
      max-width: 34rem;
      margin: 0 auto;
      line-height: 1.7;
    }

    @media screen and (max-width: 768px) {
      .prism-title {
        font-size: 3rem;
      }

      .prism-tagline {
        font-size: 1.05rem;
      }
    }
  </style>
</head>
<body>

  <section class="prism-hero">
    <div class="container">
      <div class="columns is-centered">
        <div class="column has-text-centered">

          <h1 class="title publication-title prism-title">PRISM</h1>

          <p class="prism-tagline">
            Excited about scientific discovery? We are too.<br>
            Something new is coming.
          </p>

        </div>
      </div>
    </div>
  </section>

</body>
</html>
